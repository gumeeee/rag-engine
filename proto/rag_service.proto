syntax = "proto3";

package rag_engine;

// Request message for query endpoint
message QueryRequest {
    string query_id = 1;
    string query_text = 2;
    int32 top_k = 3;
    map<string, string> metadata = 4;
}

// Response message for query endpoint
message QueryResponse {
    string query_id = 1;
    repeated SearchResult results = 2;
    LatencyBreakdown timing = 3;
    string error = 4;
}

// Individual search result
message SearchResult {
    string chunk_id = 1;
    string text = 2;
    string source = 3;
    float similarity_score = 4;
    int32 rank = 5;
}

// Latency breakdown for timing analysis
message LatencyBreakdown {
    int64 embedding_us = 1;
    int64 search_us = 2;
    int64 total_us = 3;
}

// Request message for index management endpoint
message IndexRequest {
    string corpus_path = 1;
    bool rebuild = 2;
    string index_path = 3;
}

// Response message for index management endpoint
message IndexResponse {
    bool success = 1;
    int64 num_indexed = 2;
    string error = 3;
}

// Health check response
message HealthResponse {
    string status = 1;
    string version = 2;
    bool gpu_available = 3;
    int64 memory_used_mb = 4;
}

// Corpus chunk for embedding export
message DocumentChunk {
    string id = 1;
    string text = 2;
    string source = 3;
    int32 position = 4;
    repeated float embedding = 5;
}

// Complete embedding corpus
message EmbeddingCorpus {
    repeated DocumentChunk chunks = 1;
    int32 dimension = 2;
    string model_name = 3;
}
